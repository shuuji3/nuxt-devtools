name: ci

on:
  push:
    branches:
      - main

jobs:
  ci:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: latest
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          
      - run: npm install -g corepack@latest
      - run: corepack enable

      - run: pnpm install

      - run: pnpm --filter @nuxt/devtools-docs lint

      - run: pnpm --filter @nuxt/devtools-docs generate
      
      - run: pnpm --filter @nuxt/devtools-docs typecheck

      - name: Investigate all files
        run: |
          echo "=== Global Search for .output or dist ==="
          find . -maxdepth 4 -name ".output" -o -name "dist" -type d
          
          echo "=== Root hidden files ==="
          ls -R .output/public 2>/dev/null || echo "No .output at root"
          
          echo "=== Docs hidden files ==="
          ls -R docs/.output/public 2>/dev/null || echo "No .output in docs"
          
          echo "=== All HTML files location ==="
          find . -name "*.html"

      - name: Upload everything in docs
        uses: actions/upload-artifact@v4
        with:
          name: investigation-result
          path: |
            .output/
            docs/
          include-hidden-files: true
          retention-days: 7
